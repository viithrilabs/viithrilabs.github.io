<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0C0C14;font-family:'DM Sans',sans-serif;padding:24px;display:flex;flex-direction:column;gap:16px;}
.label{font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:10px;}
.divider{height:1px;background:rgba(255,255,255,.06);}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
/* Tags */
.tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:6px 14px;border-radius:9999px;}
.tag-indigo{background:rgba(108,99,255,.12);color:#8D87FF;border:1px solid rgba(108,99,255,.3);}
.tag-outline{background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15);}
.tag-solid{background:#6C63FF;color:#fff;}
.tag-success{background:rgba(74,222,128,.1);color:#4ADE80;border:1px solid rgba(74,222,128,.2);}
.tag-warning{background:rgba(251,191,36,.1);color:#FBBF24;border:1px solid rgba(251,191,36,.2);}
.tag-error{background:rgba(248,113,113,.1);color:#F87171;border:1px solid rgba(248,113,113,.2);}
/* Status badge with dot */
.status{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-pulse{animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(108,99,255,.5);}50%{box-shadow:0 0 0 5px rgba(108,99,255,0);}}
/* Nav eyebrow tags */
.nav-tag{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:9999px;border:1px solid rgba(196,154,60,.45);color:#D4AA52;}
</style></head><body>

<div>
  <div class="label">Service / Category Tags</div>
  <div class="row">
    <span class="tag tag-indigo">Games</span>
    <span class="tag tag-indigo">Mobile Apps</span>
    <span class="tag tag-indigo">Web</span>
    <span class="tag tag-indigo">VR/AR</span>
    <span class="tag tag-indigo">Tools</span>
    <span class="tag tag-outline">Open Source</span>
    <span class="tag tag-solid">Featured</span>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="label">Status Badges</div>
  <div class="row">
    <span class="tag tag-success">✓ Live</span>
    <span class="tag tag-warning">In Progress</span>
    <span class="tag tag-error">Deprecated</span>
    <span class="tag" style="background:rgba(96,165,250,.1);color:#60A5FA;border:1px solid rgba(96,165,250,.2);">Beta</span>
    <span class="tag" style="background:rgba(168,168,200,.08);color:#A8A8C8;border:1px solid rgba(168,168,200,.15);">Coming Soon</span>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="label">Status Indicators</div>
  <div class="row" style="gap:18px;">
    <span class="status"><span class="dot dot-pulse" style="background:#6C63FF;"></span>Website launching soon</span>
    <span class="status"><span class="dot" style="background:#4ADE80;"></span>All systems normal</span>
    <span class="status"><span class="dot" style="background:#FBBF24;"></span>Maintenance mode</span>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="label">Legacy / Gold Tags (live site pattern)</div>
  <div class="row">
    <span class="nav-tag">Games</span>
    <span class="nav-tag">Mobile Apps</span>
    <span class="nav-tag">Web</span>
    <span class="nav-tag">VR/AR</span>
    <span class="nav-tag">Tools</span>
  </div>
</div>

</body></html>
