<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0C0C14;font-family:'DM Sans',sans-serif;padding:24px;display:flex;flex-direction:column;gap:20px;}
.label{font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:10px;}
.divider{height:1px;background:rgba(255,255,255,.06);}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
/* Buttons */
.btn{border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
.btn-lg{padding:14px 28px;font-size:15px;}
.btn-md{padding:11px 22px;font-size:14px;}
.btn-sm{padding:8px 16px;font-size:13px;}
.btn-primary{background:#6C63FF;color:#fff;}
.btn-primary:hover{background:#8D87FF;}
.btn-secondary{background:rgba(108,99,255,.12);color:#8D87FF;border:1px solid rgba(108,99,255,.3);}
.btn-secondary:hover{background:rgba(108,99,255,.2);}
.btn-ghost{background:transparent;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.12);}
.btn-ghost:hover{background:rgba(255,255,255,.06);color:#fff;}
.btn-danger{background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.25);}
.btn-pill{border-radius:9999px;}
.btn-disabled{opacity:.4;cursor:not-allowed;}
.btn-icon{width:40px;height:40px;padding:0;border-radius:10px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1);justify-content:center;}
</style></head><body>

<div>
  <div class="label">Primary — Sizes</div>
  <div class="row">
    <button class="btn btn-primary btn-lg">Launch Product</button>
    <button class="btn btn-primary btn-md">Get Started</button>
    <button class="btn btn-primary btn-sm">Learn More</button>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="label">Variants</div>
  <div class="row">
    <button class="btn btn-primary btn-md">Primary</button>
    <button class="btn btn-secondary btn-md">Secondary</button>
    <button class="btn btn-ghost btn-md">Ghost</button>
    <button class="btn btn-danger btn-md">Destructive</button>
    <button class="btn btn-primary btn-pill btn-md">Pill Shape</button>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="label">States</div>
  <div class="row">
    <button class="btn btn-primary btn-md">Default</button>
    <button class="btn btn-primary btn-md" style="background:#8D87FF;">Hover</button>
    <button class="btn btn-primary btn-md" style="transform:scale(.97);background:#5750E0;">Active</button>
    <button class="btn btn-primary btn-md btn-disabled" disabled>Disabled</button>
    <button class="btn btn-primary btn-md" style="border:2px solid #8D87FF;box-shadow:0 0 0 3px rgba(108,99,255,.25);">Focus</button>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="label">Light Theme Buttons</div>
  <div style="background:#FAFAFA;border-radius:10px;padding:16px;display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn btn-md" style="background:#6C63FF;color:#fff;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:500;border:none;padding:11px 22px;font-size:14px;">Primary</button>
    <button class="btn btn-md" style="background:transparent;color:#6C63FF;border:1.5px solid rgba(108,99,255,.4);border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:500;padding:11px 22px;font-size:14px;">Secondary</button>
    <button class="btn btn-md" style="background:transparent;color:#3E3E5A;border:1px solid rgba(0,0,0,.12);border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:500;padding:11px 22px;font-size:14px;">Ghost</button>
  </div>
</div>

</body></html>
