<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0C0C14;font-family:'DM Sans',sans-serif;padding:20px;display:flex;flex-direction:column;gap:14px;}
.section-label{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.35);}
.row{display:flex;gap:6px;}
.sw{flex:1;border-radius:6px;height:56px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;border:1px solid rgba(255,255,255,0.04);}
.fg-row{display:flex;gap:8px;}
.fg{flex:1;border-radius:8px;padding:12px;border:1px solid rgba(255,255,255,0.08);background:#12121E;}
</style></head><body>

<div class="section-label">Neutrals</div>
<div class="row">
  <div class="sw" style="background:#FFFFFF;"><span style="color:#0E0E18;font-size:9px;font-weight:500">0</span><span style="color:#0E0E18;font-size:9px;">#FFF</span></div>
  <div class="sw" style="background:#F8F8FC;"><span style="color:#0E0E18;font-size:9px;font-weight:500">50</span><span style="color:#0E0E18;font-size:9px;">#F8F8FC</span></div>
  <div class="sw" style="background:#EBEBF5;"><span style="color:#282838;font-size:9px;font-weight:500">100</span></div>
  <div class="sw" style="background:#D1D1E8;"><span style="color:#282838;font-size:9px;font-weight:500">200</span></div>
  <div class="sw" style="background:#A8A8C8;"><span style="color:#fff;font-size:9px;font-weight:500;opacity:.7">300</span></div>
  <div class="sw" style="background:#7A7A9A;"><span style="color:#fff;font-size:9px;font-weight:500;opacity:.8">400</span></div>
  <div class="sw" style="background:#5A5A7A;"><span style="color:#fff;font-size:9px;font-weight:500;opacity:.8">500</span></div>
  <div class="sw" style="background:#3E3E5A;"><span style="color:#fff;font-size:9px;font-weight:500;opacity:.8">600</span></div>
  <div class="sw" style="background:#282838;"><span style="color:#fff;font-size:9px;font-weight:500;opacity:.8">700</span></div>
  <div class="sw" style="background:#1A1A28;"><span style="color:#fff;font-size:9px;opacity:.7">800</span></div>
  <div class="sw" style="background:#0E0E18;border:1px solid rgba(255,255,255,.1)"><span style="color:#fff;font-size:9px;opacity:.7">900</span></div>
</div>

<div class="section-label">Light Backgrounds</div>
<div class="row">
  <div class="sw" style="background:#FAFAFA;border:1px solid rgba(0,0,0,.08);"><span style="color:#3E3E5A;font-size:9px;font-weight:500">bg-50</span><span style="color:#7A7A9A;font-size:9px">#FAFAFA</span></div>
  <div class="sw" style="background:#F4F4F8;border:1px solid rgba(0,0,0,.08);"><span style="color:#3E3E5A;font-size:9px;font-weight:500">bg-100</span></div>
  <div class="sw" style="background:#EAEAF2;border:1px solid rgba(0,0,0,.08);"><span style="color:#3E3E5A;font-size:9px;font-weight:500">bg-200</span></div>
  <div class="sw" style="background:#DCDCEA;border:1px solid rgba(0,0,0,.08);"><span style="color:#3E3E5A;font-size:9px;font-weight:500">bg-300</span></div>
  <div class="sw" style="background:#FFFFFF;border:1px solid rgba(0,0,0,.08);"><span style="color:#3E3E5A;font-size:9px;font-weight:500">surface</span></div>
</div>

<div class="section-label">Foreground Scale (dark theme)</div>
<div class="fg-row">
  <div class="fg"><span style="color:#FFFFFF;font-size:13px;font-weight:500">fg-1 — Primary</span><br><span style="color:#FFFFFF;font-size:10px;opacity:.4">#FFFFFF</span></div>
  <div class="fg"><span style="color:rgba(255,255,255,.72);font-size:13px;font-weight:400">fg-2 — Secondary</span><br><span style="color:rgba(255,255,255,.4);font-size:10px">rgba(255,255,255,.72)</span></div>
  <div class="fg"><span style="color:rgba(255,255,255,.45);font-size:13px;">fg-3 — Muted</span><br><span style="color:rgba(255,255,255,.3);font-size:10px">rgba(255,255,255,.45)</span></div>
  <div class="fg"><span style="color:rgba(255,255,255,.25);font-size:13px;">fg-4 — Disabled</span><br><span style="color:rgba(255,255,255,.2);font-size:10px">rgba(255,255,255,.25)</span></div>
</div>

</body></html>
