<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0C0C14;font-family:'DM Sans',sans-serif;padding:20px;display:flex;flex-direction:column;gap:16px;}
.label{font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:10px;}
.divider{height:1px;background:rgba(255,255,255,.06);}
.space-row{display:flex;align-items:center;gap:12px;}
.space-bar{background:#6C63FF;border-radius:2px;height:14px;flex-shrink:0;}
.space-name{font-size:11px;color:rgba(255,255,255,.7);width:60px;}
.space-px{font-size:10px;color:rgba(255,255,255,.35);}
.radius-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
.radius-box{display:flex;flex-direction:column;align-items:center;gap:6px;}
.radius-swatch{background:rgba(108,99,255,.18);border:1px solid rgba(108,99,255,.3);width:48px;height:48px;}
.radius-label{font-size:9px;color:rgba(255,255,255,.4);text-align:center;}
</style></head><body>

<div>
  <div class="label">Spacing Scale — 8px base grid</div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div class="space-row"><div class="space-bar" style="width:4px;"></div><div class="space-name">space-1</div><div class="space-px">4px</div></div>
    <div class="space-row"><div class="space-bar" style="width:8px;"></div><div class="space-name">space-2</div><div class="space-px">8px</div></div>
    <div class="space-row"><div class="space-bar" style="width:12px;"></div><div class="space-name">space-3</div><div class="space-px">12px</div></div>
    <div class="space-row"><div class="space-bar" style="width:16px;"></div><div class="space-name">space-4</div><div class="space-px">16px</div></div>
    <div class="space-row"><div class="space-bar" style="width:20px;"></div><div class="space-name">space-5</div><div class="space-px">20px</div></div>
    <div class="space-row"><div class="space-bar" style="width:24px;"></div><div class="space-name">space-6</div><div class="space-px">24px</div></div>
    <div class="space-row"><div class="space-bar" style="width:32px;"></div><div class="space-name">space-8</div><div class="space-px">32px</div></div>
    <div class="space-row"><div class="space-bar" style="width:40px;"></div><div class="space-name">space-10</div><div class="space-px">40px</div></div>
    <div class="space-row"><div class="space-bar" style="width:48px;"></div><div class="space-name">space-12</div><div class="space-px">48px</div></div>
    <div class="space-row"><div class="space-bar" style="width:64px;"></div><div class="space-name">space-16</div><div class="space-px">64px</div></div>
    <div class="space-row"><div class="space-bar" style="width:80px;"></div><div class="space-name">space-20</div><div class="space-px">80px</div></div>
    <div class="space-row"><div class="space-bar" style="width:96px;"></div><div class="space-name">space-24</div><div class="space-px">96px</div></div>
  </div>
</div>

<div class="divider"></div>

<div>
  <div class="label">Border Radius Scale</div>
  <div class="radius-row">
    <div class="radius-box"><div class="radius-swatch" style="border-radius:0;"></div><div class="radius-label">none<br>0px</div></div>
    <div class="radius-box"><div class="radius-swatch" style="border-radius:6px;"></div><div class="radius-label">sm<br>6px</div></div>
    <div class="radius-box"><div class="radius-swatch" style="border-radius:10px;"></div><div class="radius-label">md<br>10px</div></div>
    <div class="radius-box"><div class="radius-swatch" style="border-radius:16px;"></div><div class="radius-label">lg<br>16px</div></div>
    <div class="radius-box"><div class="radius-swatch" style="border-radius:24px;"></div><div class="radius-label">xl<br>24px</div></div>
    <div class="radius-box"><div class="radius-swatch" style="border-radius:9999px;width:64px;height:32px;"></div><div class="radius-label">pill<br>9999px</div></div>
  </div>
</div>

</body></html>
